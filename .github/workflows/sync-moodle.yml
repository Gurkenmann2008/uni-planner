name: Sync Moodle Tasks

on:
  schedule:
    - cron: '0 5 * * *'   # täglich 05:00 UTC = 06:00/07:00 CET/CEST
  workflow_dispatch:       # manuell auslösbar

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & parse Moodle iCal
        run: node scripts/sync-moodle.mjs
        env:
          MOODLE_ICAL_URL: ${{ secrets.MOODLE_ICAL_URL }}

      - name: Commit tasks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tasks.json
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "chore: sync Moodle tasks"
            git push
          fi
