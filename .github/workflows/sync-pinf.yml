name: Sync PInf Tasks

on:
  schedule:
    - cron: '15 5 * * *'   # täglich 05:15 UTC (nach Moodle-Sync)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & parse PInf GitHub Repo
        run: node scripts/sync-pinf.mjs
        env:
          PINF_REPO_TOKEN: ${{ secrets.PINF_REPO_TOKEN }}

      - name: Commit tasks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tasks.json
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "chore: sync PInf tasks"
            git push
          fi
